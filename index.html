<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>閾値走タイマー</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root { --bg:#0c0b0a; --panel:#141312; --chip:#1a1917; --line:#1d1c1a; --hot:#FF4B3E; }
  html,body { background:var(--bg); color:#fff; font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Segoe UI",sans-serif; min-height:100vh; }
  body { display:flex; justify-content:center; padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom); }
  .wrap { width:100%; max-width:440px; padding:40px 24px 32px; }
  .mono { font-family:ui-monospace,"SF Mono",Menlo,monospace; font-variant-numeric:tabular-nums; }
  .hidden { display:none !important; }

  .eyebrow { font-size:11px; letter-spacing:.3em; font-weight:700; color:var(--hot); margin-bottom:8px; }
  h1 { font-size:30px; font-weight:800; letter-spacing:-.02em; }
  .lede { color:#71717a; font-size:14px; margin-top:6px; }

  .row { display:flex; align-items:center; justify-content:space-between; padding:14px 0; border-bottom:1px solid var(--line); }
  .row span.lbl { color:#d4d4d8; font-size:15px; }
  .stepper { display:flex; align-items:center; gap:12px; }
  .stepper button { width:36px; height:36px; border-radius:999px; border:none; background:var(--chip); color:#e7e5e4; font-size:20px; display:flex; align-items:center; justify-content:center; }
  .stepper button:active { transform:scale(.9); }
  .stepper .val { width:64px; text-align:center; font-size:18px; }

  .toggle { width:48px; height:28px; border-radius:999px; border:none; position:relative; background:#2a2826; transition:background .2s; }
  .toggle.on { background:var(--hot); }
  .toggle .knob { position:absolute; top:4px; left:4px; width:20px; height:20px; border-radius:999px; background:#fff; transition:left .2s; }
  .toggle.on .knob { left:24px; }

  .summary { margin-top:28px; background:var(--panel); border-radius:16px; padding:16px; }
  .summary .s { display:flex; justify-content:space-between; font-size:14px; }
  .summary .s + .s { margin-top:8px; }
  .summary .s .k { color:#a1a1aa; }

  .cta { margin-top:28px; width:100%; padding:16px; border:none; border-radius:16px; font-size:18px; font-weight:800; color:#fff; background:var(--hot); box-shadow:0 8px 30px rgba(255,75,62,.35); display:flex; align-items:center; justify-content:center; gap:8px; }
  .cta:active { transform:scale(.98); }
  .note { color:#52525b; font-size:12px; margin-top:20px; line-height:1.6; }

  /* run */
  .run { display:flex; flex-direction:column; align-items:center; }
  .phaseLabel { font-size:13px; letter-spacing:.35em; font-weight:700; text-transform:uppercase; margin-bottom:4px; }
  .ringWrap { position:relative; width:min(76vw,300px); height:min(76vw,300px); margin:12px 0; }
  .ringWrap svg { width:100%; height:100%; transform:rotate(-90deg); }
  .center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .count { font-size:clamp(3rem,16vw,4.6rem); font-weight:800; line-height:1; }
  .csub { margin-top:8px; font-size:14px; font-weight:600; }

  .stats { width:100%; background:var(--panel); border-radius:16px; padding:12px 18px; margin-bottom:16px; display:flex; }
  .stats .cell { flex:1; }
  .stats .cell + .cell { border-left:1px solid var(--line); padding-left:18px; }
  .stats .cap { font-size:10px; letter-spacing:.2em; color:#71717a; text-transform:uppercase; display:flex; align-items:center; gap:4px; }
  .stats .big { font-size:1.9rem; font-weight:800; line-height:1; margin-top:6px; }
  .stats .unit { font-size:13px; color:#71717a; font-weight:400; }
  .stats .hint { font-size:12px; margin-top:3px; font-weight:600; }
  .stats .right { text-align:right; }

  .dots { display:flex; gap:10px; margin-bottom:20px; }
  .dot { width:9px; height:9px; border-radius:999px; background:#2a2826; transition:all .2s; }

  .controls { width:100%; display:flex; gap:12px; }
  .controls button { height:56px; border:none; border-radius:16px; color:#fff; font-weight:800; font-size:16px; display:flex; align-items:center; justify-content:center; gap:8px; }
  .controls button:active { transform:scale(.95); }
  .ic { width:56px; flex:0 0 56px; background:var(--chip); color:#a1a1aa; font-size:22px; }
  .main { flex:1; background:var(--chip); }
  .full { width:100%; }
  .next { color:#52525b; font-size:12px; margin-top:20px; text-align:center; }
  .err { color:#F4A259; font-size:12px; margin-top:10px; text-align:center; max-width:300px; line-height:1.5; }
</style>
</head>
<body>
<div class="wrap">

  <!-- SETUP -->
  <div id="setup">
    <div class="eyebrow">THRESHOLD</div>
    <h1>閾値走タイマー</h1>
    <p class="lede">速い刺激と回復を、音とペースが導く。</p>
    <div id="steppers"></div>
    <div class="row">
      <span class="lbl">◎ GPSで現在ペース・距離</span>
      <button id="gpsToggle" class="toggle on" onclick="toggleGps()"><span class="knob"></span></button>
    </div>
    <div class="summary">
      <div class="s"><span class="k">閾値の刺激</span><span class="mono" id="sumRep"></span></div>
      <div class="s"><span class="k">合計時間</span><span class="mono" id="sumTotal"></span></div>
    </div>
    <button class="cta" onclick="begin()">▶ スタート</button>
    <p class="note">音量をオンに。区間の切り替わりでビープ、閾値走の前は3・2・1の音。<br>GPSは初回に位置情報の許可を求めます。許可すると現在ペースと距離が表示されます。</p>
  </div>

  <!-- RUN -->
  <div id="run" class="run hidden">
    <div class="phaseLabel" id="phaseLabel"></div>
    <div class="ringWrap">
      <svg viewBox="0 0 300 300">
        <circle cx="150" cy="150" r="130" fill="none" stroke="#1c1b19" stroke-width="14"></circle>
        <circle id="ring" cx="150" cy="150" r="130" fill="none" stroke="#FF4B3E" stroke-width="14" stroke-linecap="round"></circle>
      </svg>
      <div class="center">
        <div class="count mono" id="count">0:00</div>
        <div class="csub" id="csub"></div>
      </div>
    </div>

    <div class="stats" id="statsPanel">
      <div class="cell">
        <div class="cap">◎ 現在ペース</div>
        <div class="big mono" id="paceVal">--</div>
        <div class="hint" id="paceHint"></div>
      </div>
      <div class="cell">
        <div class="cap">距離</div>
        <div class="big mono" id="distVal">0.00<span class="unit"> km</span></div>
        <div class="hint" id="targetHint" style="color:#a1a1aa"></div>
      </div>
    </div>

    <div class="dots" id="dots"></div>

    <div class="controls" id="controls">
      <button class="ic" onclick="reset()">↺</button>
      <button class="main" id="pauseBtn" onclick="togglePause()">⏸ 一時停止</button>
      <button class="ic" onclick="skip()">▶▶</button>
    </div>
    <p class="next" id="nextLabel"></p>
    <p class="err hidden" id="gpsErr"></p>
  </div>

</div>

<script>
const PHASE = {
  warmup:   { name:"ウォームアップ", color:"#F4A259", glow:"rgba(244,162,89,.4)", sub:"ゆっくり ほぐす" },
  rep:      { name:"閾値走",        color:"#FF4B3E", glow:"rgba(255,75,62,.45)", sub:"" },
  recovery: { name:"つなぎ",        color:"#34D3C0", glow:"rgba(52,211,192,.4)", sub:"ゆるめる" },
  cooldown: { name:"クールダウン",   color:"#6FA8FF", glow:"rgba(111,168,255,.4)", sub:"ゆっくり 流す" },
  done:     { name:"完了",          color:"#7CE0A0", glow:"rgba(124,224,160,.4)", sub:"おつかれさま" },
};
const cfg = { warmup:12, reps:3, repMin:6, recovery:90, cooldown:10, paceSec:270, useGps:true };

const fmt = s => { s=Math.max(0,Math.ceil(s)); return Math.floor(s/60)+":"+String(s%60).padStart(2,"0"); };
const hav = (a,b)=>{ const R=6371000,r=d=>d*Math.PI/180; const dLa=r(b.lat-a.lat),dLo=r(b.lon-a.lon),la1=r(a.lat),la2=r(b.lat);
  const x=Math.sin(dLa/2)**2+Math.cos(la1)*Math.cos(la2)*Math.sin(dLo/2)**2; return 2*R*Math.asin(Math.sqrt(x)); };

// ---- steppers ----
const STEPS = [
  {key:"warmup",  lbl:"ウォームアップ", min:0,  max:20, step:1,  d:v=>v+" 分"},
  {key:"reps",    lbl:"本数",          min:1,  max:8,  step:1,  d:v=>v+" 本"},
  {key:"repMin",  lbl:"1本の長さ",     min:3,  max:15, step:1,  d:v=>v+" 分"},
  {key:"recovery",lbl:"つなぎ",        min:30, max:180,step:15, d:v=>v+"秒"},
  {key:"cooldown",lbl:"クールダウン",   min:0,  max:15, step:1,  d:v=>v+" 分"},
  {key:"paceSec", lbl:"目標ペース /km", min:210,max:360,step:5,  d:v=>fmt(v)},
];
function buildSteppers(){
  const root=document.getElementById("steppers");
  root.innerHTML="";
  STEPS.forEach(s=>{
    const row=document.createElement("div"); row.className="row";
    row.innerHTML=`<span class="lbl">${s.lbl}</span>
      <div class="stepper">
        <button onclick="bump('${s.key}',-1)">−</button>
        <span class="val mono" id="v_${s.key}">${s.d(cfg[s.key])}</span>
        <button onclick="bump('${s.key}',1)">+</button>
      </div>`;
    root.appendChild(row);
  });
  refreshSummary();
}
function bump(key,dir){
  const s=STEPS.find(x=>x.key===key);
  cfg[key]=Math.max(s.min,Math.min(s.max,cfg[key]+dir*s.step));
  document.getElementById("v_"+key).textContent=s.d(cfg[key]);
  refreshSummary();
}
function toggleGps(){ cfg.useGps=!cfg.useGps; document.getElementById("gpsToggle").classList.toggle("on",cfg.useGps); }
function refreshSummary(){
  document.getElementById("sumRep").textContent = cfg.repMin+"分 × "+cfg.reps+"本 = "+(cfg.repMin*cfg.reps)+"分";
  let t=(cfg.warmup+cfg.cooldown)*60 + cfg.reps*cfg.repMin*60 + (cfg.reps-1)*cfg.recovery;
  document.getElementById("sumTotal").textContent = "約 "+Math.round(t/60)+"分";
}

// ---- audio ----
let actx=null;
function ensureAudio(){ if(!actx){const A=window.AudioContext||window.webkitAudioContext; if(A)actx=new A();} if(actx&&actx.state==="suspended")actx.resume(); }
function beep(f,dur,type="sine",vol=.25){ if(!actx)return; const o=actx.createOscillator(),g=actx.createGain(); o.connect(g);g.connect(actx.destination);
  o.type=type;o.frequency.value=f; const t=actx.currentTime; g.gain.setValueAtTime(.0001,t); g.gain.linearRampToValueAtTime(vol,t+.012);
  g.gain.exponentialRampToValueAtTime(.0001,t+dur); o.start(t);o.stop(t+dur+.02); }
const cueGo=()=>{beep(880,.18,"square",.22);setTimeout(()=>beep(1175,.28,"square",.22),150);};
const cueEase=()=>beep(440,.35,"sine",.25);
const cueCool=()=>{beep(520,.22);setTimeout(()=>beep(390,.32),200);};
const cueTick=()=>beep(660,.10,"triangle",.2);
const cueDone=()=>[523,659,784,1046].forEach((f,i)=>setTimeout(()=>beep(f,.3,"sine",.25),i*180));

// ---- wake lock ----
let wake=null;
async function reqWake(){ try{ if("wakeLock" in navigator) wake=await navigator.wakeLock.request("screen"); }catch(e){} }
function relWake(){ try{ wake&&wake.release(); }catch(e){} wake=null; }
document.addEventListener("visibilitychange",()=>{ if(document.visibilityState==="visible"&&running&&!paused&&idx>=0)reqWake(); });

// ---- GPS ----
let watchId=null,lastFix=null,vEma=null,totalDist=0,curPace=null,gpsStatus="off";
function startGps(){
  if(!cfg.useGps)return;
  if(!("geolocation" in navigator)){ gpsStatus="unsupported"; showErr("この端末は位置情報に対応していません。"); return; }
  gpsStatus="searching"; lastFix=null; vEma=null; totalDist=0; curPace=null; hideErr();
  try{
    watchId=navigator.geolocation.watchPosition(onPos,onErr,{enableHighAccuracy:true,maximumAge:1000,timeout:10000});
  }catch(e){ gpsStatus="unsupported"; showErr("位置情報を開始できませんでした。"); }
}
function onPos(p){
  gpsStatus="active"; hideErr();
  const a=p.coords.accuracy, now=p.timestamp;
  const cur={lat:p.coords.latitude,lon:p.coords.longitude,t:now};
  let v=(typeof p.coords.speed==="number"&&p.coords.speed>=0)?p.coords.speed:null;
  if(lastFix){
    const dt=(now-lastFix.t)/1000, d=hav(lastFix,cur);
    if(dt>0){
      const seg=d/dt;
      if(v==null) v=seg;
      // 距離は「動いていて・妥当な」区間だけ加算（停止時のドリフトを除外）
      if(a<30 && d>=1 && seg>=0.5 && seg<12) totalDist+=d;
    }
  }
  lastFix=cur;
  if(v!=null){
    vEma = vEma==null ? v : vEma*0.6 + v*0.4;
    curPace = vEma<0.5 ? null : 1000/vEma;
  }
}
function onErr(e){
  if(e.code===1){ gpsStatus="denied";
    showErr("位置情報が許可されていません。"+(e.message&&e.message.indexOf("permissions policy")>=0
      ? "このページが枠内で開かれている可能性があります。ファイルをブラウザで直接開いてください。"
      : "ブラウザの設定で位置情報を許可してください。")); }
  else if(e.code===2){ gpsStatus="searching"; showErr("位置を取得できません（信号待ち）。空の見える場所で少しお待ちください。"); }
  else { gpsStatus="searching"; }
}
function stopGps(){ if(watchId!=null){ try{navigator.geolocation.clearWatch(watchId);}catch(e){} watchId=null; } lastFix=null;vEma=null;curPace=null;gpsStatus="off"; }
function showErr(m){ const el=document.getElementById("gpsErr"); el.textContent=m; el.classList.remove("hidden"); }
function hideErr(){ document.getElementById("gpsErr").classList.add("hidden"); }

// ---- engine ----
let seq=[],idx=0,phaseEnd=0,pausedRem=0,running=false,paused=false,lastBeep=null,loop=null;
function buildSeq(){ const s=[]; if(cfg.warmup>0)s.push({type:"warmup",dur:cfg.warmup*60});
  for(let i=0;i<cfg.reps;i++){ s.push({type:"rep",dur:cfg.repMin*60,rep:i+1}); if(i<cfg.reps-1)s.push({type:"recovery",dur:cfg.recovery}); }
  if(cfg.cooldown>0)s.push({type:"cooldown",dur:cfg.cooldown*60}); return s; }
function startPhase(i){
  if(i>=seq.length){ finish(); return; }
  idx=i; const ph=seq[i]; phaseEnd=Date.now()+ph.dur*1000; lastBeep=null;
  if(ph.type==="rep")cueGo(); else if(ph.type==="recovery")cueEase(); else if(ph.type==="cooldown")cueCool();
  renderRun(ph.dur);
}
function begin(){
  ensureAudio(); beep(.0001,.01);
  seq=buildSeq(); running=true; paused=false;
  document.getElementById("setup").classList.add("hidden");
  document.getElementById("run").classList.remove("hidden");
  document.getElementById("statsPanel").style.display = cfg.useGps ? "flex" : "none";
  buildDots(); reqWake(); startGps(); startPhase(0);
  loop=setInterval(tick,100);
}
function tick(){
  if(!running||paused||idx<0)return;
  const rem=(phaseEnd-Date.now())/1000, ph=seq[idx];
  if(ph&&(ph.type==="warmup"||ph.type==="recovery")){ const s=Math.ceil(rem);
    if(s<=3&&s>=1&&s!==lastBeep){ lastBeep=s; cueTick(); } }
  if(rem<=0){ startPhase(idx+1); return; }
  renderRun(rem);
}
function togglePause(){
  if(paused){ phaseEnd=Date.now()+pausedRem; paused=false; reqWake(); document.getElementById("pauseBtn").textContent="⏸ 一時停止"; }
  else { pausedRem=phaseEnd-Date.now(); paused=true; relWake(); document.getElementById("pauseBtn").textContent="▶ 再開"; }
}
function skip(){ if(idx>=0)startPhase(idx+1); }
function finish(){ idx=-1; running=true; clearInterval(loop); cueDone(); relWake(); stopGps(); renderDone(); }
function reset(){ clearInterval(loop); running=false; paused=false; idx=0; relWake(); stopGps();
  document.getElementById("run").classList.add("hidden"); document.getElementById("setup").classList.remove("hidden");
  document.getElementById("pauseBtn").textContent="⏸ 一時停止"; }

// ---- render ----
const C=2*Math.PI*130;
function buildDots(){ const d=document.getElementById("dots"); d.innerHTML="";
  for(let i=0;i<cfg.reps;i++){ const e=document.createElement("div"); e.className="dot"; e.id="dot_"+i; d.appendChild(e);} }
function renderRun(rem){
  const ph=seq[idx], P=PHASE[ph.type];
  document.getElementById("phaseLabel").textContent = ph.type==="rep" ? "閾値走 "+ph.rep+" / "+cfg.reps : P.name;
  document.getElementById("phaseLabel").style.color=P.color;
  const ring=document.getElementById("ring"); ring.style.stroke=P.color;
  ring.style.strokeDasharray=C; ring.style.strokeDashoffset=C*(1-Math.max(0,Math.min(1,rem/ph.dur)));
  ring.style.filter="drop-shadow(0 0 12px "+P.glow+")"; ring.style.transition="stroke-dashoffset .2s linear,stroke .4s";
  document.getElementById("count").textContent=fmt(rem);
  const csub=document.getElementById("csub"); csub.style.color=P.color;
  csub.textContent = ph.type==="rep" ? "目標 "+fmt(cfg.paceSec)+"/km" : P.sub;
  // stats
  if(cfg.useGps) updateStats(ph);
  // dots
  for(let i=0;i<cfg.reps;i++){ const rpi=seq.findIndex(p=>p.type==="rep"&&p.rep===i+1);
    const el=document.getElementById("dot_"+i); let st = idx>rpi?"done":idx===rpi?"active":"todo";
    el.style.background = st==="todo" ? "#2a2826" : PHASE.rep.color;
    el.style.width=el.style.height = st==="active" ? "12px":"9px"; el.style.opacity = st==="done"?.5:1; }
  const ni=idx+1; document.getElementById("nextLabel").textContent="次："+(ni<seq.length?PHASE[seq[ni].type].name:"完了");
}
function updateStats(ph){
  const pv=document.getElementById("paceVal"), hint=document.getElementById("paceHint");
  let txt,color="#e7e5e4",h="";
  if(gpsStatus==="denied")txt="許可なし"; else if(gpsStatus==="unsupported")txt="非対応";
  else if(gpsStatus==="searching")txt="探索中"; else if(curPace==null)txt="--";
  else txt=fmt(curPace);
  if(curPace!=null&&gpsStatus==="active"&&ph.type==="rep"){
    if(curPace>cfg.paceSec+8){color="#F4A259";h="もう少し速く";}
    else if(curPace<cfg.paceSec-8){color="#6FA8FF";h="速すぎ・抑えて";}
    else {color="#7CE0A0";h="ピッタリ";}
  }
  pv.innerHTML = txt + (curPace!=null&&gpsStatus==="active" ? '<span class="unit"> /km</span>' : "");
  pv.style.color=color; hint.textContent=h; hint.style.color=color;
  document.getElementById("distVal").innerHTML=(totalDist/1000).toFixed(2)+'<span class="unit"> km</span>';
  document.getElementById("targetHint").textContent="目標 "+fmt(cfg.paceSec)+"/km";
}
function renderDone(){
  const P=PHASE.done;
  document.getElementById("phaseLabel").textContent=P.name; document.getElementById("phaseLabel").style.color=P.color;
  const ring=document.getElementById("ring"); ring.style.stroke=P.color; ring.style.strokeDashoffset=0; ring.style.filter="drop-shadow(0 0 12px "+P.glow+")";
  document.getElementById("count").textContent="✓"; const csub=document.getElementById("csub"); csub.style.color=P.color;
  csub.textContent = cfg.useGps ? "計 "+(totalDist/1000).toFixed(2)+" km" : P.sub;
  for(let i=0;i<cfg.reps;i++){ const el=document.getElementById("dot_"+i); el.style.background=PHASE.rep.color; el.style.opacity=.5; }
  document.getElementById("controls").innerHTML='<button class="main full" onclick="reset()">↺ もう一度</button>';
  document.getElementById("nextLabel").textContent="";
}

buildSteppers();
</script>
</body>
</html>
